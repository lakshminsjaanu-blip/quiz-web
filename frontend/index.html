<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Registration System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">QuizMaster</a>
        <ul class="nav-links">
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>
    <div class="container text-center">
        <div class="card" style="padding: 4rem 2rem;">
            <h1 class="mb-4" style="font-size: 2.5rem; color: var(--primary-color);">Welcome to Quiz Registration System</h1>
            <p class="mb-4" style="font-size: 1.2rem; max-width: 600px; margin-left: auto; margin-right: auto;">
                Test your knowledge across 10 different subjects including C Programming, Java, Python, and more. Register now to get started!
            </p>
            <div class="mt-4">
                <a href="register.html" class="btn" style="margin-right: 1rem; padding: 1rem 2rem;">Get Started</a>
                <a href="login.html" class="btn btn-secondary" style="padding: 1rem 2rem;">Login</a>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        // Redirect to subjects if already logged in
        if (localStorage.getItem('user')) {
            window.location.href = 'subjects.html';
        }
    </script>
</body>
</html>
