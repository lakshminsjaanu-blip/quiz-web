<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuizReg</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="brand">
            <span class="brand-badge">Q</span>
            QuizReg
        </a>
        <ul class="nav-links">
            <li><a href="register.html" class="btn btn-ghost">Register</a></li>
            <li>
                <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path d="M12 3a1 1 0 0 1 1 1v2.2a1 1 0 1 1-2 0V4a1 1 0 0 1 1-1zm0 13.8a4.8 4.8 0 1 0 0-9.6 4.8 4.8 0 0 0 0 9.6zM4.6 7.4a1 1 0 0 1 1.4 0l1.5 1.5a1 1 0 1 1-1.4 1.4L4.6 8.8a1 1 0 0 1 0-1.4zm12.9 7.2a1 1 0 0 1 1.4 0l1.5 1.5a1 1 0 0 1-1.4 1.4l-1.5-1.5a1 1 0 0 1 0-1.4zM3 12a1 1 0 0 1 1-1h2.2a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1zm13.8 0a1 1 0 0 1 1-1H20a1 1 0 1 1 0 2h-2.2a1 1 0 0 1-1-1zM4.6 16.6a1 1 0 0 1 1.4 0l1.5-1.5a1 1 0 0 1 1.4 1.4l-1.5 1.5a1 1 0 0 1-1.4-1.4zm12.9-7.2a1 1 0 0 1 1.4 0 1 1 0 0 1 0 1.4l-1.5 1.5a1 1 0 1 1-1.4-1.4l1.5-1.5z" fill="currentColor"></path>
                    </svg>
                    <span class="sr-only">Toggle theme</span>
                </button>
            </li>
        </ul>
    </nav>
    <div class="container" style="max-width: 500px; margin-top: 4rem;">
        <div class="card">
            <h2 class="text-center mb-4 text-primary-color">Welcome Back</h2>
            <div id="alertBox" class="alert hidden"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required
                        placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-block">Login</button>
                <div class="text-center mt-4">
                    <p>Don't have an account? <a href="register.html" style="color: var(--primary-color);">Register
                            here</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alertBox');

            try {
                const res = await fetch(`${window.API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'subjects.html';
                } else {
                    alertBox.textContent = data.error;
                    alertBox.className = 'alert alert-error';
                    alertBox.classList.remove('hidden');
                }
            } catch (err) {
                alertBox.textContent = 'Server error. Please try again.';
                alertBox.className = 'alert alert-error';
                alertBox.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
