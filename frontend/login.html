<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quiz System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">QuizMaster</a>
        <ul class="nav-links">
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>
    <div class="container" style="max-width: 500px; margin-top: 4rem;">
        <div class="card">
            <h2 class="text-center mb-4 text-primary-color">Welcome Back</h2>
            <div id="alertBox" class="alert hidden"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required
                        placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-block">Login</button>
                <div class="text-center mt-4">
                    <p>Don't have an account? <a href="register.html" style="color: var(--primary-color);">Register
                            here</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alertBox');

            try {
                const res = await fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'subjects.html';
                } else {
                    alertBox.textContent = data.error;
                    alertBox.className = 'alert alert-error';
                    alertBox.classList.remove('hidden');
                }
            } catch (err) {
                alertBox.textContent = 'Server error. Please try again.';
                alertBox.className = 'alert alert-error';
                alertBox.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
