<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects - Quiz System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">QuizMaster</a>
        <ul class="nav-links">
            <li style="font-weight: 500;">Welcome, <span id="userName">User</span></li>
            <li><a href="results.html">results</a></li>
            <li><a href="#" id="logoutBtn" style="color: var(--danger);">Logout</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="text-center mb-4 mt-4">
            <h2>Select a Subject</h2>
            <p>Choose one of the 10 subjects below to start your quiz.</p>
        </div>
        <div id="loading" class="text-center">Loading subjects...</div>
        <div id="subjectGrid" class="grid grid-cols-2 hidden">
            <!-- Subjects will be loaded here dynamically -->
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        checkAuth(); // Ensure user is logged in

        const user = JSON.parse(localStorage.getItem('user'));
        document.getElementById('userName').textContent = user.name;

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        async function fetchSubjects() {
            try {
                const res = await fetch('http://localhost:5000/quizzes');
                const subjects = await res.json();

                const grid = document.getElementById('subjectGrid');
                document.getElementById('loading').classList.add('hidden');
                grid.classList.remove('hidden');

                const colors = ['#e0e7ff', '#dcfce7', '#fef3c7', '#fee2e2', '#f3e8ff', '#ffedd5', '#ecfeff', '#fce7f3', '#f1f5f9', '#dbeafe'];

                subjects.forEach((subject, index) => {
                    const card = document.createElement('div');
                    card.className = 'subject-card';
                    card.style.backgroundColor = colors[index % colors.length];

                    const title = document.createElement('h3');
                    title.textContent = subject.subject_name;
                    title.style.marginBottom = '1rem';
                    title.style.color = '#111827';

                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.textContent = 'Start Quiz';
                    btn.onclick = () => {
                        window.location.href = `quiz.html?id=${subject.quiz_id}&name=${encodeURIComponent(subject.subject_name)}`;
                    };

                    card.appendChild(title);
                    card.appendChild(btn);
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('loading').textContent = 'Failed to load subjects.';
            }
        }

        fetchSubjects();
    </script>
</body>

</html>
