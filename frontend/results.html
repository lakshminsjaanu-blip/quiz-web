<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Results History - QuizReg</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <a href="subjects.html" class="brand">
            <span class="brand-badge">Q</span>
            QuizReg
        </a>
        <ul class="nav-links">
            <li><a href="subjects.html">Back to Subjects</a></li>
            <li><a href="#" id="logoutBtn" class="btn btn-outline">Logout</a></li>
            <li>
                <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path d="M12 3a1 1 0 0 1 1 1v2.2a1 1 0 1 1-2 0V4a1 1 0 0 1 1-1zm0 13.8a4.8 4.8 0 1 0 0-9.6 4.8 4.8 0 0 0 0 9.6zM4.6 7.4a1 1 0 0 1 1.4 0l1.5 1.5a1 1 0 1 1-1.4 1.4L4.6 8.8a1 1 0 0 1 0-1.4zm12.9 7.2a1 1 0 0 1 1.4 0l1.5 1.5a1 1 0 0 1-1.4 1.4l-1.5-1.5a1 1 0 0 1 0-1.4zM3 12a1 1 0 0 1 1-1h2.2a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1zm13.8 0a1 1 0 0 1 1-1H20a1 1 0 1 1 0 2h-2.2a1 1 0 0 1-1-1zM4.6 16.6a1 1 0 0 1 1.4 0l1.5-1.5a1 1 0 0 1 1.4 1.4l-1.5 1.5a1 1 0 0 1-1.4-1.4zm12.9-7.2a1 1 0 0 1 1.4 0 1 1 0 0 1 0 1.4l-1.5 1.5a1 1 0 1 1-1.4-1.4l1.5-1.5z" fill="currentColor"></path>
                    </svg>
                    <span class="sr-only">Toggle theme</span>
                </button>
            </li>
        </ul>
    </nav>
    <div class="container" style="max-width: 800px; margin-top: 2rem;">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="margin: 0;">My Quiz History</h2>
                <button id="exportBtn" class="btn hidden" style="background-color: var(--success); color: white;">Export
                    to CSV</button>
            </div>
            <div id="loading" class="text-center">Loading results...</div>
            <div id="resultsList" class="hidden">
                <!-- History items will appear here -->
            </div>
            <div id="emptyMessage" class="hidden text-center" style="padding: 2rem;">
                <p>You haven't taken any quizzes yet.</p>
                <a href="subjects.html" class="btn mt-4">Start a Quiz</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        checkAuth(); // Ensure user is logged in

        const user = JSON.parse(localStorage.getItem('user'));

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        let globalHistory = [];

        async function fetchHistory() {
            try {
                const res = await fetch(`${window.API_BASE}/results/${user.id}`);
                const history = await res.json();
                globalHistory = history;

                document.getElementById('loading').classList.add('hidden');

                if (history.length === 0) {
                    document.getElementById('emptyMessage').classList.remove('hidden');
                } else {
                    const list = document.getElementById('resultsList');
                    list.classList.remove('hidden');
                    document.getElementById('exportBtn').classList.remove('hidden');

                    history.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'history-item';

                        const sub = document.createElement('div');
                        sub.innerHTML = `<strong>${item.subject_name}</strong>`;

                        const score = document.createElement('div');
                        score.innerHTML = `<span style="font-weight: bold; color: var(--primary-color);">Score: ${item.score} / 10</span>`;

                        div.appendChild(sub);
                        div.appendChild(score);
                        list.appendChild(div);
                    });
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loading').textContent = 'Failed to load history.';
            }
        }

        document.getElementById('exportBtn').addEventListener('click', () => {
            if (globalHistory.length === 0) return;

            let csvContent = "Subject,Score,Total\n";

            globalHistory.forEach(item => {
                // Escape commas or quotes in subject name if necessary
                let subject = item.subject_name.replace(/"/g, '""');
                csvContent += `"${subject}",${item.score},10\n`;
            });

            // Add UTF-8 BOM for Excel compatibility
            const BOM = "\uFEFF";
            const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });

            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "quiz_results.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        fetchHistory();
    </script>
</body>

</html>
